name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # GitHub *project* Pages is served under /<repo>/ (e.g. …/402-earth/). The
      # bundle must reference /402-earth/assets/… or the browser requests /assets/
      # from the github.io host root and gets HTML/404 → stuck on "Loading…".
      #
      # Apex custom domain (e.g. 402.earth) is usually a *separate* deploy with
      # VITE_BASE_PATH=/ (e.g. Cloudflare Pages env). Do not change this job to "/"
      # unless this artifact is only ever served from the domain root.
      - run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
